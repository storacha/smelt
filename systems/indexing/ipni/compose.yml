# IPNI System - InterPlanetary Network Indexer
#
# Content discovery indexer using storetheindex.
# Provides content routing for the Storacha network.

services:
  # IPNI (storetheindex) - Content discovery indexer
  ipni:
    image: ${IPNI_IMAGE:-forreststoracha/storetheindex:dev}
    ports:
      - "3000:3000"   # Finder (queries)
      # Note: 3001 (Ingest HTTP) not exposed to host - accessed via internal network
      - "3002:3002"   # Admin
      - "3003:3003"   # P2P (libp2p advertisement sync)
    volumes:
      - ipni-data:/root/.storetheindex
      - ./entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/entrypoint.sh"]
    environment:
      # OTEL telemetry (enabled when using 'make up-telemetry')
      - OTEL_TRACES_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_METRICS_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_ENDPOINT:-}
      - OTEL_SERVICE_NAME=ipni
    healthcheck:
      test: ["CMD", "/usr/local/bin/storetheindex", "admin", "status"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - storacha-network

volumes:
  ipni-data:
