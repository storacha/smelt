# Common System - Shared infrastructure services
#
# DynamoDB Local for state persistence.
# Used by: delegator, upload, piri
#
# MinIO for S3-compatible object storage.
# Used by: upload
#
# SMTP4Dev for email testing.
# Used by: upload

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    # Root so docker's auto-created volume dir (root-owned) is writable. The
    # upstream image's dynamodblocal uid 1000 can't write into a fresh named
    # volume without a chown sidecar.
    user: "0:0"
    ports:
      - "15010:8000"
    # -dbPath persists tables to disk (default is in-memory). Required so
    # delegator's allow list and upload's provider registry survive restarts
    # and are captured by `smelt snapshot save`.
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/data"]
    volumes:
      - dynamodb-data:/data
    healthcheck:
      # The previous `|| exit 0` fallback here made the healthcheck always
      # report healthy, so `depends_on: condition: service_healthy`
      # greenlit dependents before dynamodb had actually bound port 8000.
      # Sprue would then try to create its tables and crash on
      # `dial tcp: connection refused`. /shell/ is dynamodb-local's JS
      # web shell; it returns 200 once the process is serving.
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/shell/"]
      start_interval: 1s
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - storacha-network
  # MinIO for S3-compatible storage
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "15070:9000"  # S3 API
      - "15071:9001"  # Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      start_interval: 1s
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - storacha-network
  email:
    image: rnwood/smtp4dev:v3
    ports:
      - "15080:25"
      - "15081:80"  # Web UI / API
    networks:
      - storacha-network

volumes:
  minio-data:
  dynamodb-data:
