# Common System - Shared infrastructure services
#
# DynamoDB Local for state persistence.
# Used by: delegator, upload, piri
#
# MinIO for S3-compatible object storage.
# Used by: upload

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/shell/ || exit 0"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - storacha-network
  # MinIO for S3-compatible storage
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"   # S3 API (external 9002, internal 9000 - avoids conflict with indexer on 9000)
      - "9003:9001"   # Console (external 9003, internal 9001)
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - storacha-network
  email:
    image: rnwood/smtp4dev:v3
    ports:
      - "2525:25"
      - "2580:80"   # Web UI / API
    networks:
      - storacha-network

volumes:
  minio-data:
