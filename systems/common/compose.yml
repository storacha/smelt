# Common System - Shared infrastructure services
#
# DynamoDB Local for state persistence.
# Used by: delegator, upload, piri
#
# MinIO for S3-compatible object storage.
# Used by: upload
#
# SMTP4Dev for email testing.
# Used by: upload

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/shell/ || exit 0"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - storacha-network
  # MinIO for S3-compatible storage
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - storacha-network
  email:
    image: rnwood/smtp4dev:v3
    networks:
      - storacha-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/api/server"]

volumes:
  minio-data:
