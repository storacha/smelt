# Tempo Configuration - Distributed Tracing

server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 48h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

querier:
  frontend_worker:
    frontend_address: localhost:9095

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  processor:
    # service_graphs produces Prometheus metrics for each service→service
    # call observed in incoming traces. Grafana's Node Graph in the Tempo
    # datasource reads these metrics to draw the live topology.
    service_graphs:
      # 10k nodes+edges is ample for a single dev stack.
      max_items: 10000
      # Treat client-side spans as outbound calls to their peer.service.
      # Without this, only server-received spans create edges.
      dimensions: []

# Per-tenant opt-in: the metrics-generator only runs processors that are
# enabled here. Tempo defaults every processor off for safety.
overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
