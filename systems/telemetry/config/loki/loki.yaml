# Loki single-binary config for local dev.
#
# Filesystem-backed chunks and index (no S3, no replication), in-memory ring.
# Suitable for one container, one user, low volume. For scaled deployments
# Loki wants an object store and memberlist ring — not something we need here.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  # Quiet the per-request access logs — Loki is chatty otherwise and swamps
  # its own container logs (which Alloy would then re-ingest, creating a loop).
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # structured_metadata is how Alloy attaches per-line fields (like trace_id)
  # so Grafana can render them as clickable link-outs to Tempo.
  allow_structured_metadata: true
  # Default is 4MB/s per stream; bump for bursty dev workloads like stress-tester.
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  # Keep 7 days of logs. Chunks beyond this are deleted by the compactor.
  retention_period: 168h
  max_query_lookback: 168h

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  delete_request_store: filesystem

ruler:
  alertmanager_url: http://localhost:9093
