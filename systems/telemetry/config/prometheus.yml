# Prometheus Configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # OTEL Collector metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  # cAdvisor — per-container resource metrics (CPU, mem, net, last-seen).
  # Emits hundreds of series per container; most are opt-out-able via the
  # --disable_metrics flag on the cadvisor service.
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
