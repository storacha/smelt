# Blockchain System - Local Filecoin chain (Anvil-based)
#
# Provides the local blockchain for smart contract interactions.
# Used by: signing-service, delegator, piri

services:
  blockchain:
    image: ${BLOCKCHAIN_IMAGE:-ghcr.io/storacha/filecoin-localdev:main}
    # Port mapping is env-var interpolated so pkg/stack can override to
    # `"8545"` (container-only, ephemeral host port) for parallel SDK
    # test stacks. `make up` leaves the var unset and gets the fixed
    # 15XXX default.
    ports:
      - "${SMELT_BLOCKCHAIN_PORT:-15000:8545}"
    volumes:
      # Chain state lives in generated/snapshot-scratch/. The `/output` dir
      # mount receives the SIGTERM dump from the entrypoint on every stop,
      # and the per-file input mounts pick that same dump up on the next
      # boot — so `make down; make up` resumes from where work left off
      # rather than from the baseline. systems/blockchain/state/*.json is
      # the committed post-deploy baseline; Makefile's ensure-state target
      # seeds scratch from it on first run and `make clean` / `make nuke`
      # clears scratch to force a true cold boot.
      - ../../generated/snapshot-scratch/anvil-state.json:/app/anvil-state.json:ro
      - ../../generated/snapshot-scratch/deployed-addresses.json:/deployed-addresses.json:ro
      - ../../generated/snapshot-scratch:/output
    environment:
      - ANVIL_BLOCK_TIME=3
    healthcheck:
      # Container touches /tmp/ready after contracts are deployed/loaded AND
      # mockrpc is accepting requests. Sentinel is strictly more accurate than
      # an eth_blockNumber probe, which succeeds before the mock RPC layer is up.
      test: ["CMD", "test", "-f", "/tmp/ready"]
      start_interval: 1s
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - storacha-network
