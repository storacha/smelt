# Upload service configuration for Docker Compose environment

deployment:
  environment: "development"
  allow_provision_without_payment_plan: true # allows provision without customer
  max_replicas: 3

server:
  host: "0.0.0.0"
  port: 80  # Use port 80 for did:web resolution
  public_url: http://localhost:15060

identity:
  key_file: "/keys/upload.pem"
  service_did: "did:web:upload"

indexer:
  endpoint: "http://indexer:80"
  did: "did:web:indexer"

mailer:
  type: "smtp"
  sender: "dev@storacha.network"
  smtp_addr: "email:25"
  smtp_auth_user: "upload"
  smtp_auth_secret: "secret"

storage:
  type: "postgres"

  postgres:
    dsn: "postgres://sprue:sprue@postgres:5432/sprue?sslmode=disable"
    max_conns: 10
    min_conns: 0

  s3:
    endpoint: "http://minio:9000"
    region: "us-west-1"
    agent_message_bucket: "agent-message"
    delegation_bucket: "delegation"
    upload_shards_bucket: "upload-shards"

log:
  level: "info"
