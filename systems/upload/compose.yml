# Upload System - Sprue (upload coordination service)
#
# Handles upload coordination, blob allocation, and UCAN processing.
# Used by: guppy

services:
  upload:
    image: ${UPLOAD_IMAGE:-ghcr.io/storacha/sprue:main}
    command: ["serve", "--config", "/etc/sprue/config.yaml"]
    ports:
      - "${SMELT_UPLOAD_PORT:-15060:80}"
    # Pass SPRUE_SERVER_PUBLIC_URL through from the host env when set.
    # sprue/viper treats it as an override for `server.public_url` in
    # config.yaml. pkg/stack's SDK test path sets this to
    # `http://upload:80` so validation emails embed an in-network URL
    # the ExecDoer-based clicker can reach (since test stacks don't
    # have a stable host port on sprue). `make up` leaves it unset and
    # falls back to the config.yaml value.
    environment:
      - SPRUE_SERVER_PUBLIC_URL
    volumes:
      - ../../generated/keys/upload.pem:/keys/upload.pem:ro
      # Mount the full generated keys and proofs directories so post_start.sh
      # can loop over every piri-N node declared in smelt.yml and register it
      # as a storage provider. Read-only on both.
      - ../../generated/keys:/piri-keys:ro
      - ../../generated/proofs:/proofs:ro
      - ./post_start.sh:/post_start.sh:ro
      - ./config:/etc/sprue:ro
    post_start:
      - command: sh ./post_start.sh
    depends_on:
      indexer:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      start_interval: 1s
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - storacha-network

  # Postgres for sprue's metadata stores. Sprue runs goose migrations on
  # startup, so no init sidecar is needed — the `sprue` database created by
  # POSTGRES_DB is enough. Separate from `piri-postgres` (which is generated
  # from smelt.yml when piri nodes use db: postgres).
  postgres:
    image: postgres:16-alpine
    ports:
      - "${SMELT_UPLOAD_POSTGRES_PORT:-15061:5432}"
    environment:
      - POSTGRES_USER=sprue
      - POSTGRES_PASSWORD=sprue
      - POSTGRES_DB=sprue
    volumes:
      - upload-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sprue -d sprue"]
      start_interval: 1s
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - storacha-network

volumes:
  upload-postgres-data:
